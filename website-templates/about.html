<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">About Us</title>
  <meta name="description" id="meta-desc" content="" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","system-ui","sans-serif"]},colors:{navy:{950:"#05101E",900:"#080F1C",800:"#0D1829",700:"#152238",600:"#1E3352"}}}}}</script>
  <style>body{font-family:"Inter",system-ui,sans-serif;}</style>
  <script src="config.js"></script><script src="_shared.js"></script><script>PAGE_DEPTH=0;</script>
</head>
<body class="bg-white text-gray-900 antialiased">
<div id="top-bar" class="bg-navy-950 border-b border-white/[0.07]"></div>
<nav class="sticky top-0 z-50 bg-navy-900/95 backdrop-blur-md border-b border-white/[0.07]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" id="nav-inner"></div>
</nav>
<div id="breadcrumb" class="bg-navy-800 border-b border-white/[0.07]"></div>

<!-- HERO -->
<section class="bg-navy-800 py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <p class="text-orange-500 text-xs font-bold uppercase tracking-[.18em] mb-3">Our Story</p>
    <h1 id="about-h1" class="text-5xl md:text-6xl font-black text-white mb-4"></h1>
    <p id="about-sub" class="text-xl text-gray-300 max-w-2xl mx-auto"></p>
  </div>
</section>

<!-- OWNER + STORY -->
<section class="bg-white py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid md:grid-cols-2 gap-14 items-center">
      <div class="relative">
        <div class="aspect-[3/4] rounded-3xl overflow-hidden shadow-2xl max-w-sm mx-auto md:mx-0">
          <img id="owner-photo" src="" alt="Owner" class="w-full h-full object-cover object-top" />
        </div>
        <div class="absolute -bottom-5 -right-5 bg-orange-500 rounded-2xl px-5 py-4 shadow-2xl shadow-orange-500/40">
          <p id="founded-badge" class="text-4xl font-black text-white leading-none"></p>
          <p class="text-orange-200 text-sm font-semibold mt-0.5">Year Founded</p>
        </div>
      </div>
      <div>
        <p class="text-orange-500 text-xs font-bold uppercase tracking-[.18em] mb-2">The Founder</p>
        <h2 id="owner-name" class="text-4xl font-black text-gray-900 mb-1"></h2>
        <p id="owner-title" class="text-orange-500 font-semibold mb-5"></p>
        <p id="owner-story" class="text-gray-600 text-lg leading-relaxed"></p>
      </div>
    </div>
  </div>
</section>

<!-- STATS -->
<section class="bg-navy-800 py-14">
  <div class="max-w-5xl mx-auto px-4 sm:px-6">
    <div id="stats-strip" class="grid grid-cols-2 md:grid-cols-4 gap-10 text-center"></div>
  </div>
</section>

<!-- VALUES -->
<section class="bg-gray-50 py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <p class="text-orange-500 text-xs font-bold uppercase tracking-[.18em] mb-2">What We Stand For</p>
      <h2 class="text-4xl font-black text-gray-900">Core Values</h2>
    </div>
    <div id="values-grid" class="grid md:grid-cols-3 gap-6"></div>
  </div>
</section>

<!-- TIMELINE -->
<section class="bg-white py-20">
  <div class="max-w-4xl mx-auto px-4 sm:px-6">
    <div class="text-center mb-12">
      <p class="text-orange-500 text-xs font-bold uppercase tracking-[.18em] mb-2">History</p>
      <h2 class="text-4xl font-black text-gray-900">Our Journey</h2>
    </div>
    <div id="timeline" class="relative space-y-8">
      <div class="absolute left-4 top-2 bottom-2 w-0.5 bg-orange-200 md:left-1/2"></div>
    </div>
  </div>
</section>

<!-- TEAM -->
<section class="bg-gray-50 py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-12">
      <p class="text-orange-500 text-xs font-bold uppercase tracking-[.18em] mb-2">The Team</p>
      <h2 class="text-4xl font-black text-gray-900">Meet the People Behind the Work</h2>
    </div>
    <div id="team-grid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </div>
</section>

<!-- CERTIFICATIONS -->
<section class="bg-navy-800 py-16">
  <div class="max-w-5xl mx-auto px-4 text-center">
    <p class="text-orange-500 text-xs font-bold uppercase tracking-[.18em] mb-2">Credentials</p>
    <h2 class="text-4xl font-black text-white mb-10">Licensed, Certified & Insured</h2>
    <div id="certs-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
    <p id="license-display" class="text-gray-400 text-sm"></p>
  </div>
</section>

<!-- CTA -->
<section class="bg-white py-16">
  <div class="max-w-2xl mx-auto px-4 text-center">
    <h2 id="cta-h2" class="text-4xl font-black text-gray-900 mb-3"></h2>
    <p class="text-gray-500 text-lg mb-8">Call us or schedule online — we respond within 5 minutes.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a id="cta-call" href="#" class="flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white font-bold px-7 py-4 rounded-2xl text-lg transition-all shadow-xl shadow-orange-500/30">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z"/></svg>
        <span id="cta-phone-text"></span>
      </a>
      <a href="contact.html" class="flex items-center justify-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-900 font-bold px-7 py-4 rounded-2xl text-lg transition-all">
        Schedule Online
      </a>
    </div>
  </div>
</section>

<footer class="bg-navy-950 border-t border-white/[0.07] py-14"><div id="footer-inner"></div></footer>
<div id="sticky-bar"></div>

<script>
(function(){
  const A = CONFIG.about;
  const yrs = new Date().getFullYear() - CONFIG.yearFounded;
  renderNav({ breadcrumb:[{ label:'About Us' }] });
  renderFooter();
  renderStickyBar('contact.html');

  document.getElementById('page-title').textContent = `About ${CONFIG.businessName} | ${CONFIG.city}, ${CONFIG.state}`;
  document.getElementById('meta-desc').content = `Learn about ${CONFIG.businessName} — ${CONFIG.city}'s trusted HVAC company since ${CONFIG.yearFounded}. ${CONFIG.tagline}.`;

  document.getElementById('about-h1').textContent = `About ${CONFIG.businessName}`;
  document.getElementById('about-sub').textContent = `${CONFIG.tagline}. Serving ${CONFIG.city} since ${CONFIG.yearFounded}.`;

  document.getElementById('owner-photo').src = CONFIG.ownerPhoto;
  document.getElementById('founded-badge').textContent = CONFIG.yearFounded;
  document.getElementById('owner-name').textContent = A.ownerName;
  document.getElementById('owner-title').textContent = A.ownerTitle;
  document.getElementById('owner-story').textContent = A.story;

  const statsData = [
    { v:`${yrs}+`, l:"Years in Business" },
    { v:`${CONFIG.jobsCompleted.toLocaleString()}+`, l:"Jobs Completed" },
    { v:`${CONFIG.rating}★`, l:`${CONFIG.reviewCount}+ Reviews` },
    { v:CONFIG.responseTime, l:"Avg Response Time" },
  ];
  document.getElementById('stats-strip').innerHTML = statsData.map(s =>
    `<div><p class="text-4xl font-black text-orange-500 mb-1">${s.v}</p><p class="text-gray-400 text-sm font-medium">${s.l}</p></div>`
  ).join('');

  const WHY_ICONS_MAP = { clock:ICONS.clock2, shield:ICONS.shield, star:ICONS.star };
  document.getElementById('values-grid').innerHTML = A.values.map(v =>
    `<div class="bg-white rounded-2xl p-7 border border-gray-100 shadow-sm text-center">
       <div class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-500/30">
         <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">${WHY_ICONS_MAP[v.icon]||ICONS.star}</svg>
       </div>
       <h3 class="font-black text-gray-900 text-xl mb-2">${v.title}</h3>
       <p class="text-gray-500 leading-relaxed">${v.desc}</p>
     </div>`
  ).join('');

  const timeline = document.getElementById('timeline');
  A.milestones.forEach((m, i) => {
    const side = i % 2 === 0 ? 'md:pr-8 md:text-right md:ml-0 md:mr-auto' : 'md:pl-8 md:ml-auto';
    timeline.innerHTML += `
      <div class="relative pl-10 md:pl-0 md:w-1/2 ${side}">
        <div class="absolute left-0 top-1 md:left-auto md:right-0 md:translate-x-1/2 ${i%2===0?'md:translate-x-full':''} w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center text-white text-xs font-black shadow-lg shadow-orange-500/30 z-10">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <div class="bg-gray-50 rounded-2xl p-5 border border-gray-100 shadow-sm">
          <p class="text-orange-500 font-black text-lg">${m.year}</p>
          <p class="text-gray-700 font-semibold">${m.event}</p>
        </div>
      </div>`;
  });

  document.getElementById('team-grid').innerHTML = A.team.map(t =>
    `<div class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm">
       <div class="aspect-square bg-gray-200">
         <img src="${t.photo}" alt="${t.name}" class="w-full h-full object-cover object-top" />
       </div>
       <div class="p-5">
         <p class="font-black text-gray-900 text-lg">${t.name}</p>
         <p class="text-orange-500 font-semibold text-sm">${t.role}</p>
         <p class="text-gray-400 text-xs mt-1">${t.years} years experience</p>
       </div>
     </div>`
  ).join('');

  document.getElementById('certs-grid').innerHTML = CONFIG.certifications.map(c =>
    `<div class="flex items-center gap-2.5 bg-white/10 border border-white/20 rounded-2xl px-4 py-3">
       <svg class="w-5 h-5 text-orange-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
       <span class="text-white font-semibold text-sm">${c}</span>
     </div>`
  ).join('');
  document.getElementById('license-display').textContent = `TX HVAC License #${CONFIG.licenseNum} · Fully Insured · ${CONFIG.city}, ${CONFIG.state}`;

  document.getElementById('cta-h2').textContent = `Ready to Experience the ${CONFIG.businessName} Difference?`;
  document.getElementById('cta-call').href = `tel:${CONFIG.phoneRaw}`;
  document.getElementById('cta-phone-text').textContent = `Call ${CONFIG.phone}`;
})();
</script>
</body>
</html>
